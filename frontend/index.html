<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Assistant - Nova Tech College</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="h-full bg-slate-950 text-slate-100">
  <div class="min-h-screen flex">
    <aside class="hidden md:flex w-80 flex-col border-r border-slate-800 bg-slate-900/80 p-6">
      <div class="mb-8">
        <h1 class="text-2xl font-bold text-cyan-400">Nova Tech College</h1>
        <p class="mt-1 text-sm text-slate-400">Nova Assistant — Your student support assistant</p>
      </div>

      <div class="rounded-2xl border border-slate-800 bg-slate-900 p-4">
        <h2 class="mb-3 text-sm font-semibold uppercase tracking-wide text-slate-400">Quick questions</h2>
        <div class="space-y-2">
          <button class="quick-question w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-left text-sm hover:border-cyan-500 hover:bg-slate-900">
            How many times may I retake an exam?
          </button>
          <button class="quick-question w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-left text-sm hover:border-cyan-500 hover:bg-slate-900">
            What should I do if I am sick during my internship?
          </button>
          <button class="quick-question w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-left text-sm hover:border-cyan-500 hover:bg-slate-900">
            How do I submit a complaint?
          </button>
          <button class="quick-question w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-left text-sm hover:border-cyan-500 hover:bg-slate-900">
            What happens if I miss an exam?
          </button>
        </div>
      </div>
    </aside>

    <main class="flex min-h-screen flex-1 flex-col">
      <header class="border-b border-slate-800 bg-slate-900/70 px-6 py-5 backdrop-blur">
        <h2 class="text-lg font-semibold">Student Support Chat</h2>
        <p class="text-sm text-slate-400">Ask questions about exams, attendance, complaints, privacy, and internships.</p>
      </header>

      <section id="chat" class="flex-1 space-y-4 overflow-y-auto px-4 py-6 md:px-8">
        <div class="flex">
          <div class="max-w-3xl rounded-2xl border border-slate-800 bg-slate-900 px-4 py-3 text-sm leading-7 text-slate-200 shadow-lg">
            Hi! I'm Nova Assistant. Ask me anything about Nova Tech College policies and student support.
          </div>
        </div>
      </section>

      <div class="border-t border-slate-800 bg-slate-900/80 px-4 py-4 md:px-8">
        <form id="chat-form" class="mx-auto flex max-w-4xl gap-3">
          <input
            id="question-input"
            type="text"
            placeholder="Type your question..."
            class="flex-1 rounded-2xl border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-slate-100 outline-none placeholder:text-slate-500 focus:border-cyan-500"
            required
          />
          <button
            type="submit"
            class="rounded-2xl bg-cyan-400 px-5 py-3 text-sm font-semibold text-slate-950 transition hover:bg-cyan-300"
          >
            Send
          </button>
        </form>
      </div>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
